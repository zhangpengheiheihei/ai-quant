            if (ma20 && ma20.data != null) html += '<div style="color:#4caf50;">MA20: <b>' + ma20.data.toFixed(2) + '</b></div>';
            if (ma60 && ma60.data != null) html += '<div style="color:#2196f3;">MA60: <b>' + ma60.data.toFixed(2) + '</b></div>';
            return html;
        }
    },
    axisPointer: {
        link: [{ xAxisIndex: 'all' }]

        {

            gridIndex: 1,
            data: dates,

            splitLine: { show: false },

            max: 'dataMax'
        }
    ],
    yAxis: [
        {
            scale: true,
            splitArea: { show: true },

        {
            scale: true,
            gridIndex: 1,
            splitNumber: 2,

            axisLine: { show: false },
            axisTick: { show: false },
            splitLine: { show: false }
        }

    dataZoom: [
        {
            type: 'inside',
            xAxisIndex: [0, 1],

        },
        {
            show: true,
            xAxisIndex: [0, 1],

            end: 100,
            height: 24
        }
    ],
    series: [
        {
            name: 'K线',
            type: 'candlestick',
            data: ohlcData,
            itemStyle: {
                color: upColor,
                color0: downColor,
                borderColor: upColor,
                borderColor0: downColor
            },
            markLine: {
                silent: true,
                symbol: 'none',
                label: { fontSize: 10, color: '#999' },
                lineStyle: { type: 'dashed', color: '#bbb', width: 1 },

                    { yAxis: 20.7, label: { formatter: '最高 20.7' } },
                    { yAxis: 5.67, label: { formatter: '最低 5.67' } }
                ]
            }
        },
        {
            name: 'MA5',
            type: 'line',
            data: ma5Data,
            smooth: true,
            lineStyle: { opacity: 0 },
            itemStyle: { color: '#e74c3c' },
            symbol: 'none',
            emphasis: { disabled: true }
        },
        {
            name: 'MA10',
            type: 'line',
            data: ma10Data,
            smooth: true,
            lineStyle: { opacity: 0 },
            itemStyle: { color: '#ff9800' },
            symbol: 'none',
            emphasis: { disabled: true }
        },
        {
            name: 'MA20',

        {

                };
            })

});

// Volume chart (standalone)
var volChart = echarts.init(document.getElementById('volume-chart'));
volChart.setOption({
    tooltip: {
        trigger: 'axis',
        axisPointer: { type: 'shadow' },
        formatter: function(params) {
            var d = params[0].axisValue;
            var v = params[0].data;
            return '<div style="font-weight:600;margin-bottom:4px;">' + d + '</div>'
                 + '<div>成交量: <b>' + (v / 10000).toFixed(0) + '万手</b></div>';
        }
    },
    grid: { left: '8%', right: '8%', top: '8%', bottom: '8%' },
    xAxis: {
        type: 'category',
        data: dates,
        boundaryGap: true,
        axisLabel: { formatter: function(v) { return v.substring(5); } }
    },
    yAxis: {
        axisLabel: { formatter: function(v) { return (v / 10000).toFixed(0) + '万'; } },

    dataZoom: [

            return {
                value: v[1],
                itemStyle: { color: v[2] === 1 ? upColor : downColor }
            };
        })
    }]
});

// Close price chart
var closeData = ohlcData.map(function(v) { return v[1]; });
var closeChart = echarts.init(document.getElementById('close-chart'));
closeChart.setOption({
    tooltip: {
        trigger: 'axis',
        formatter: function(params) {
            var v = params[0];
            return '<div style="font-weight:600;margin-bottom:4px;">' + v.axisValue + '</div>'
                 + '<div style="color:#667eea;">收盘价: <b>' + Number(v.data).toFixed(2) + '</b></div>';
        }
    },
    grid: { left: '8%', right: '8%', top: '8%', bottom: '12%' },
    xAxis: {
        type: 'category',
        data: dates,
        boundaryGap: false,
        axisLabel: { formatter: function(v) { return v.substring(5); } }
    },
    yAxis: {
        scale: true,
        axisLabel: { formatter: '{value}' },
        splitLine: { lineStyle: { type: 'dashed', color: '#e8e8e8' } }
    },
    dataZoom: [
        { type: 'inside', start: 50, end: 100 },
        { show: true, type: 'slider', bottom: 0, start: 50, end: 100, height: 24 }

    series: [{
        name: '收盘价',
        type: 'line',
        data: closeData,
        symbol: 'none',
        lineStyle: { width: 2, color: '#667eea' },
        itemStyle: { color: '#667eea' },
        areaStyle: {
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [

        },

            symbol: 'none',

            lineStyle: { type: 'dashed', color: '#ccc', width: 1 },
            data: [
                { yAxis: Math.max.apply(null, closeData), label: { formatter: '最高 {c}' } },
                { yAxis: Math.min.apply(null, closeData), label: { formatter: '最低 {c}' } }
            ]
        }
    }]
});

window.addEventListener('resize', function() { klineChart.resize(); volChart.resize(); closeChart.resize(); });
</script>
